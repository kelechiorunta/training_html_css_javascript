<!doctype html>
<html>
  <style>
    body {
      background-color: powderblue;
    }

    h1 {
      color: blue;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    p {
      text-align: center;
      font-size: 20px;
    }
  </style>
  <body>
    <h1>My Website</h1>

    <p>Home | About | Contact</p>

    <p>This paragraph should be hidden.</p>
