<!-- Challenge: Build a Page Layout
Test your understanding of HTML layout elements by completing this coding challenge.

Instructions
Inside the editor, complete the following steps:
Add a <header> with an <h1> containing My Website
Add a <nav> with links to #home, #about, and #contact
Add a <section> containing an <article> with an <h2> and a <p>
Add a <footer> with a paragraph containing Copyright 2026 -->

<!doctype html>
<html>
  <body>
    <!-- Build the layout here -->
    <header>
      <h1>My Website</h1>
    </header>

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
    <section>
      <article>
        <h2></h2>
        <p></p>
      </article>
    </section>
    <footer><p>&copy;Copyright 2026</p></footer>
  </body>
</html>
