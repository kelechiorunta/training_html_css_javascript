<!-- Challenge: Group Headings and Paragraphs
Test your understanding of CSS by completing a small coding challenge.

Instructions
  Inside the editor, complete the following steps:
    Use an element selector to set all p elements color to blue
    Use a class selector to set .highlight background-color to yellow
    Use an id selector to set #intro font-size to 20px 
-->

<!doctype html>
<html>
  <head>
    <style>
      /* element selector */
      p {
        color: blue;
      }
      /* class selector */

      /* id selector */
    </style>
  </head>
  <body>
    <p id="intro">Welcome to CSS selectors.</p>
    <p>This is a normal paragraph.</p>
    <p class="highlight">This paragraph is highlighted.</p>
  </body>
</html>
