<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile Page</title>
  </head>

  <body>
    <!-- Header Section -->
    <header>
      <h1>My Profile</h1>
      <nav>
        <a href="#about">About</a> | <a href="#skills">Skills</a> |
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <hr />

    <!-- About Section -->
    <section id="about">
      <h2>About Me</h2>
      <img src="student.png" alt="Profile Picture" width="150" height="150" />
      <p>
        Hello! My name is <strong>John Doe</strong>. I am learning HTML and web
        development.
      </p>
    </section>

    <hr />

    <!-- Skills Section -->
    <section id="skills">
      <h2>My Skills</h2>
      <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ul>

      <h3>Skill Progress</h3>
      <label for="html">HTML:</label>
      <progress id="html" value="80" max="100"></progress>
      <br />

      <label for="css">CSS:</label>
      <progress id="css" value="60" max="100"></progress>
    </section>

    <hr />

    <!-- STOP HERE -->

    <!-- Contact Section -->
    <section id="contact">
      <h2>Contact Me</h2>

      <form action="#" method="post">
        <label for="name">Name:</label><br />
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
        />
        <br /><br />

        <label for="email">Email:</label><br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <br /><br />

        <label for="message">Message:</label><br />
        <textarea id="message" name="message" rows="4" cols="30"></textarea>
        <br /><br />

        <button type="submit">Send</button>
      </form>
    </section>

    <hr />

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 My Profile Page</p>
    </footer>
  </body>
</html>
