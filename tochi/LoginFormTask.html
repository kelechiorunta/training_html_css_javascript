Challenge: Build a Login Form
Test your understanding of HTML input types by completing this coding challenge.

<!-- INSTRUCTIONS -->
<!--
1. Fix the missing types in the input elements
2. Add a checkbox input with name="remember"
3. Add a submit input with value="Log In" -->

<!DOCTYPE html>
<html>
<body>

<h1>Login</h1>

<form>
  <label for="email">Email:</label><br>
  <input type="email" id="email" name="email"><br><br>

<label for="pwd">Password:</label><br>
<input type="password" id="pwd" name="pwd"><br><br>

  <!-- Add checkbox and submit here -->
  <input type="checkbox" name="remember">
  <input type="Submit" value="Log In">
</form>

</body>
</html>
