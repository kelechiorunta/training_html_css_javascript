<!-- 
 Challenge: Formatting Elements
Test your understanding of HTML formatting by completing this coding challenge.

Instructions
Inside the editor, complete the following steps:
Wrap the word important in a <strong> element
Wrap the word carefully in an <em> element
Wrap the word milk in a <mark> element
Wrap the 2 in H2O with a <sub> element
Wrap the word blue in a <del> element

Challenge: Div and Span
Test your understanding of block and inline elements by completing this coding challenge.

Instructions
Inside the editor, complete the following steps:
Wrap the London heading and paragraph in a <div> element (block-level container)
Wrap the Oslo heading and paragraph in another <div> element
In the London paragraph, wrap the word capital in a <span> element (inline container)
In the Oslo paragraph, wrap the word capital in a <span> element  
 -->

<!doctype html>
<html>
  <body>
    <!-- First Challenge -->
    <h1>Formatting Text</h1>

    <p>This is an <strong>important</strong>message.</p>
    <p>Please read <em>carefully</em>.</p>
    <p>Do not forget to buy <mark>milk</mark> today.</p>
    <p>The chemical formula for water is: H<sub>2</sub>O</p>
    <p>My favorite color is <del>blue</del> red.</p>

    <!-- Second Challenge -->
     <div>
      <h2>London</h2>
      <p>London is the <span>capital</span> of England.</p>
    </div>

    <div>
      <h2>Oslo</h2>
      <p>Oslo is the <span>capital</span> of Norway.</p>
    </div>
  </body>
</html>
