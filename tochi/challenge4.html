<!-- Instructions
Inside the editor, complete the following steps:
  Add the viewport <meta> tag in the <head> section (set width to device-width and initial-scale to 1.0)
  Prevent the image from overflowing: set img max-width to 100% and height to auto
  Make the content area responsive: set .content width to 100%
  
Challenge: Flexbox Intro
Test your understanding of CSS Flexbox basics by completing a small coding challenge.

Instructions
Inside the editor, complete the following steps:
Set the .container display to flex
Set the .container flex-direction to row
Set the .container gap to 10px
-->

<!doctype html>
<html>
  <head>

     <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- add viewport meta tag here -->
    <style>
      img {
        max-width: 100%;
        height: auto;
      }

      .content {
        padding: 20px;
        width: 100%;
      }

      .container {
        background-color: #f1f1f1;
        padding: 10px;
        display: flex;
        flex-direction: row;
        gap: 10px;
      }

      .container > div {
        background-color: #04aa6d;
        color: white;
        padding: 20px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Responsive Page</h1>
      <p>
        This page uses the viewport meta tag and relative widths to look good on
        all devices.
      </p>
      <img
        src="https://www.w3schools.com/css/img_5terre.jpg"
        alt="Cinque Terre"
      />
    </div>

    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </body>
</html>
