<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="styles.css"/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>boiler-plate</title>
<style>
    td {
        text-align: center;
    }

<body>

<div>

<ul style="list-style-type: none;">
<li>Eggs</li>
<li>Milk</li>
<li>Bread</li>
</ul>

<ol>

            <th>Item</th>

        </tr>

    <tbody>
        <tr>
            <td>Eggs</td>
            <td>12</td>

        <tr>
            <td>Milk</td>

        </tr>
        <tr>

        </tr>
    </tbody>
</table>

</div>

</html>
