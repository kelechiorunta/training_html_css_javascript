<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="styles.css"/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>boiler-plate</title>
<style>
    td {
        text-align: center;
    }
</style>
</head> 
   
<body>
<img src="preview1.png" alt="" width="200px" height="200px"/>

<div>
<button>Click Me</button>
<button style="box-sizing: content-box; width: 100px;">Click here</button> 
<button style="box-sizing: border-box; width: 100px;">PRESS</button>
<ul style="list-style-type: none;">
<li>Eggs</li>
<li>Milk</li>
<li>Bread</li>
</ul>

<ol>
<li>Eggs</li>
<li>Milk</li>
<li>Bread</li>

</ol>
<table border="1" style="border-collapse: collapse;">
    <thead>
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Eggs</td>
            <td>12</td>
            <td>$2.99</td>
        </tr>
        <tr>
            <td>Milk</td>
            <td>1</td>
            <td>$3.49</td>
        </tr>
        <tr>
            <td>Bread</td>
            <td>2</td>
            <td>$2.49</td>
        </tr>
    </tbody>
</table>

<form action="" onsubmit="" method="" target="" >
    <!-- <label for="name">Name:</label> -->
    <input placeholder="Enter Name" type="name" id="name" name="name">
    <br>
    <input placeholder="Enter Email" type="email" id="email" name="email">
    <br>
    <input placeholder="Enter Password" type="password" id="password" name="password">
    <br>
    <input placeholder="Phone Number" type="number" id="phone number" name="phone number">
    <br>
    <label for="Dates">Select Dates of birth:</label>
    <input type="date" id="Dates" name="Dates">
    <br>
    <label for="newsletter">Subscribe to newsletter</label>
    <input type="checkbox" id="newsletter" name="newsletter" value="subscribe">
    <br>
    <label for="Gender">Select Gender:</label>
    <input type="radio" id="male" name="Gender" value="male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="Gender" value="female">
    <label for="female">Female</label>
    <input type="file" id="file" name="file">
    <input type="hidden" id="hidden" name="hidden" value="hiddenValue">
    <input type="submit" value="Submit">
</form>

<form action="">
    <label for="country">Select Country:
    <select name="country" id="country">
        <option value="usa">United States</option>
        <option value="canada">Canada</option>
        <option value="mexico" selected>Mexico</option>
        <option value="united-kingdom">United Kingdom</option>
    </select>
    </label>
    <textarea name="" id="" rows="4" cols="2"></textarea>
    <fieldset>
        <legend>Personal Information</legend>
        <input type="text" id="firstName" name="firstName" placeholder="First Name">
        <input type="text" id="lastName" name="lastName" placeholder="Last Name">
    </fieldset>
  
        <form action="">
        <input type="text" list="browsers" name="browser" placeholder="Choose a browser">
        <datalist id="browsers">
            <option value="Chrome">
            <option value="Firefox">
            <option value="Safari">
            <option value="Edge">
        </datalist>
    </form>
    <output></output>
</form>


</form>
<video controls width="320" height="240">
    <source src="Sample.mp4" type="video/mp4">
    <!-- <source src="video.ogg" type="video/ogg"> -->
    Your browser does not support the video tag.
</video>

</div>

</body>

</html>
